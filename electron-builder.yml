appId: edu.sjtu.cnmooc.downloader
productName: CNMOOC Downloader
copyright: Copyright © 2026 sunalan2025

directories:
  output: release
  buildResources: build

# What goes into the asar archive. We only need our own source + minimal deps.
files:
  - src/**/*
  - public/**/*
  - electron/**/*
  - package.json
  - "!**/.git"
  - "!**/.github"
  - "!**/*.md"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/*.map"
  - "!node_modules/**/{LICENSE,license,LICENSE.md,license.md,LICENSE.txt,*.markdown,CHANGELOG*,*.d.ts}"

# Playwright's CJS modules must live outside asar so the spawned chromium can
# be located via require() at runtime.
asarUnpack:
  - node_modules/playwright/**/*
  - node_modules/playwright-core/**/*

# Bundle the chromium binary itself (downloaded into pw-cache/ by
# scripts/prepare-build.cjs). Without this, the installed app would have no
# browser engine for headless probing and would fail on first use.
extraResources:
  - from: pw-cache
    to: pw-cache
    filter:
      - "**/*"

win:
  target: nsis
  artifactName: ${productName}-${version}-win-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CNMOOC Downloader

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  category: public.app-category.education

linux:
  target: AppImage
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  category: Education

publish: null
