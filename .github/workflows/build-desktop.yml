name: build-desktop

# Builds Electron installers for Win/macOS/Linux on tag push and uploads them
# to the matching GitHub Release. Also supports manual dispatch for testing.
#
# Note: Playwright's chromium binary is NOT bundled (~300 MB hit). End users
# need to run `npx playwright install chromium` once after install. See README.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write  # needed to attach assets to releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: '*.AppImage'
          - os: windows-latest
            artifact: '*.exe'
          - os: macos-latest
            artifact: '*.dmg'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes electron-builder --publish never

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cnmooc-downloader-${{ matrix.os }}
          path: release/${{ matrix.artifact }}
          if-no-files-found: warn

      - name: Attach installers to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ matrix.artifact }}
          fail_on_unmatched_files: false
