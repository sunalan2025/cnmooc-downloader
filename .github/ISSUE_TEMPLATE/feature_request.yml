name: Feature request
description: 提一个新功能或改进建议
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 描述你目前遇到的痛点或不便之处
      placeholder: 例如：希望能定时自动下载新课件，不必每次手动打开
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方式
      description: 你心目中的实现思路，可以是粗略的
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 如果有，说明为什么觉得它们不够好
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 其他补充信息
      description: 相关链接、截图、用户场景
    validations:
      required: false
